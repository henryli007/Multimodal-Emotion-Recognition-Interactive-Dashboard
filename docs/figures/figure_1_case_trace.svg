ass="h" x="454" y="236" text-anchor="start">最终状态</text><text class="t" x="454" y="262" text-anchor="start">悲伤 39%  高兴 25%</text><text class="t" x="454" y="284" text-anchor="start">紧张 18%</text><rect class="box" x="646" y="124" width="202" height="176"/><text class="h" x="662" y="149" text-anchor="start">命中节点</text><text class="t" x="662" y="176" text-anchor="start">压力</text><text class="t" x="662" y="198" text-anchor="start">情绪压抑</text><text class="t" x="662" y="220" text-anchor="start">深呼吸</text><text class="t" x="662" y="242" text-anchor="start">设定小目标</text><text class="s" x="662" y="276" text-anchor="start">检索：LightRAG hybrid</text><rect class="box" x="872" y="124" width="280" height="176"/><text class="h" x="888" y="149" text-anchor="start">回复条件</text><text class="t" x="888" y="176" text-anchor="start">融合情绪 + 原话 + 图谱证据</text><text class="t" x="888" y="214" text-anchor="start">“听起来你在努力维持轻松，</text><text class="t" x="888" y="236" text-anchor="start">但其实已经很累了……”</text><text class="s" x="888" y="274" text-anchor="start">TTS → 数字人视频</text><path class="edge" d="M208,212 H232"/><path class="edge" d="M414,212 H438"/><path class="edge" d="M622,212 H646"/><path class="edge" d="M848,212 H872"/><text class="s" x="48" y="375" text-anchor="start">图 1  语气与语义冲突时，系统不会把单一模态当作真值，而是保留两路证据后形成可解释的融合状态。</text></svg>